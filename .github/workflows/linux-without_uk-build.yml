on:
  push:
    paths:
      - '.github/workflows/linux.yml'
      - '.github/workflows/run-linux'
name: Linux (build --without_uk and install)

jobs:
  list:
    name: list available perl versions
    runs-on: 'ubuntu-latest'
    steps:
      - uses: shogo82148/actions-setup-perl@v1
      - id: set-matrix
        name: list available perl versions
        shell: perl {0}
        run: |
          use Actions::Core;
          set_output(matrix => {perl => [grep { $_ =~ /^5\.32/ } perl_versions()]});
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}

  build:
    runs-on: 'ubuntu-latest'
    needs: list
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.list.outputs.matrix)}}
    name: Perl ${{ matrix.perl }}
    steps:
      - name: check out code
        uses: actions/checkout@v6

      - name: switch to perl ${{ matrix.perl }}
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl }}

      - name: run tests
        env:
          BUILD_TEST: 1
          PERL_USE_UNSAFE_INC: 0
        run: |
            perl -v
            cpanm --quiet --notest ExtUtils::MakeMaker Test::Pod Test::Pod::Coverage parent
            cpanm --quiet --notest File::ShareDir::Install XML::XPath Data::CompactReadonly File::Find::Rule Text::CSV_XS LWP::Protocol::https
            cpanm --quiet --notest --installdeps .
            ./build-data.sh
            perl Makefile.PL --without_uk INSTALL_BASE=$HOME/test_install
            make test TEST_VERBOSE=1
            make install
            perl -I$HOME/test_install/lib/perl5 -MData::Dumper::Concise -MNumber::Phone -e 'if(Number::Phone->new("+447979866975")->isa("Number::Phone::StubCountry::GB")) { print "N::P built/installed correctly without N::P::UK\n".Dumper(\%INC); exit(0) } else { print "N::P build/install failed\n"; exit(1) }'

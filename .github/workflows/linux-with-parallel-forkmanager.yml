# Auto-generated file, see workflow-templates/linux-with-parallel-forkmanager.yml

on:
  push:
    paths:
      - '.github/workflows/linux-with-parallel-forkmanager.yml'
      - '.github/workflows/run-linux-with-parallel-forkmanager'
name: Linux (build with Parallel::ForkManager)
jobs:
  list:
    name: list available perl versions
    runs-on: 'ubuntu-latest'
    steps:
      - uses: shogo82148/actions-setup-perl@v1
      - id: set-matrix
        name: list available perl versions
        shell: perl {0}
        run: |
          use Actions::Core;
          set_output(matrix => {perl => [grep { $_ =~ /^5\.32/ } perl_versions()]});
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
  build:
    runs-on: 'ubuntu-latest'
    needs: list
    strategy:
      fail-fast: false
      matrix: ${{fromJson(needs.list.outputs.matrix)}}
    name: Perl ${{ matrix.perl }}
    steps:
      - name: check out code
        uses: actions/checkout@v6
      - name: switch to perl ${{ matrix.perl }}
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl }}
      - name: run tests
        env:
          BUILD_TEST: 1
          PERL_USE_UNSAFE_INC: 0
        run: |
            perl -v
            cpanm Parallel::ForkManager
            cpanm --quiet --notest ExtUtils::MakeMaker Test::Pod Test::Pod::Coverage parent
            cpanm --quiet --notest File::ShareDir::Install XML::XPath Data::CompactReadonly File::Find::Rule Text::CSV_XS LWP::Protocol::https
            cpanm --quiet --notest --installdeps .
            ./build-data.sh
            cpanm --installdeps .
            perl Makefile.PL
            make test
